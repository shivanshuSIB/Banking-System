version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     banking
      POSTGRES_PASSWORD: banking
      POSTGRES_DB:       banking
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://banking:banking@postgres:5432/banking?sslmode=disable"
      ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
